[project]
# 允许的来源
allow_origins = ["*"]

# 会话超时（秒）
session_timeout = 3600

[features]
# 是否允许用户编辑消息
edit_message = true

# 自动标签
auto_tag_thread = true

# 用户消息 Markdown 渲染
user_message_markdown = true

# 允许分享对话
allow_thread_sharing = false

# ── 文件上传（附件/回形针按钮）──
[features.spontaneous_file_upload]
enabled = true
accept = ["*/*"]
max_files = 20
max_size_mb = 500

# ── 语音输入（麦克风按钮）──
[features.audio]
enabled = true
sample_rate = 24000

[UI]
# 应用名称
name = "ColorBridge 色译通"

# 主题: light 或 dark
default_theme = "light"

# 自定义 CSS 样式
custom_css = "/public/custom.css"

# Chain of Thought 显示模式
cot = "full"

# 新建对话时确认提示
confirm_new_chat = true

[meta]
generated_by = "2.0.0"
